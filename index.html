<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Discharge Kiosk</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <div id="white-overlay"></div>

  <video id="gpu-video" autoplay muted loop playsinline></video>

  <div id="ui">
    <div id="battery-level">Battery: --%</div>
    <div id="drain-rate">Drain rate: -- %/hr</div>
    <div id="status">Starting drain...</div>
    <button id="start-btn">Start</button>
  </div>

  <div id="idleOverlay">
    <div id="idleMessage">Battery reached 55%. Remove battery now.</div>
  </div>

  <script src="app.js"></script>
</body>


  
</html>
